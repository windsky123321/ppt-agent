name: Build Windows EXE

env:
  PYTHONIOENCODING: utf-8

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-windows-exe:
    runs-on: windows-latest

    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: 安装后端依赖
        shell: powershell
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt

      - name: 安装前端依赖
        shell: powershell
        run: |
          Set-Location -LiteralPath frontend
          npm.cmd install

      - name: 安装 PyInstaller
        shell: powershell
        run: |
          python --version
          python -m pip --version
          python -m pip install --upgrade pip
          python -m pip install pyinstaller
          python -m pip show pyinstaller
          python -m PyInstaller --version

      - name: 构建前端
        shell: powershell
        run: |
          Set-Location -LiteralPath frontend
          npm.cmd run build

      - name: 构建前诊断
        shell: powershell
        run: |
          Get-Location
          if (-not (Test-Path "packaging/launcher.spec")) { throw "缺少 packaging/launcher.spec" }
          if (-not (Test-Path "desktop/launcher.py")) { throw "缺少 desktop/launcher.py" }
          if (-not (Test-Path "frontend/dist/index.html")) { throw "缺少 frontend/dist/index.html" }
          Get-ChildItem packaging
          Get-ChildItem desktop

      - name: PowerShell 语法检查
        shell: powershell
        run: |
          $scriptContent = Get-Content -Raw 'scripts/build_windows_exe_ci.ps1'
          $errors = $null
          [void][System.Management.Automation.PSParser]::Tokenize($scriptContent, [ref]$errors)
          if ($errors -and $errors.Count -gt 0) { throw 'PowerShell syntax check failed' }
          Write-Host 'PowerShell syntax check passed'

      - name: 执行 CI 专用 Windows EXE 构建脚本
        shell: powershell
        run: |
          powershell -ExecutionPolicy Bypass -File scripts/build_windows_exe_ci.ps1

      - name: 校验发布目录
        shell: powershell
        run: |
          chcp 65001
          $env:PYTHONIOENCODING = "utf-8"
          python scripts/check_windows_release.py

      - name: 检查 EXE 是否存在
        shell: powershell
        run: |
          if (-not (Test-Path "release/PPT-Agent.exe")) {
            Write-Error "未找到 release/PPT-Agent.exe"
          }

      - name: 上传 Windows 发布包
        uses: actions/upload-artifact@v4
        with:
          name: PPT-Agent-Windows-Release
          path: release/
