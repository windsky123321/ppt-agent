name: Release Windows EXE

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  PYTHONIOENCODING: utf-8

jobs:
  release-windows-exe:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend dependencies
        shell: powershell
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt

      - name: Install frontend dependencies
        shell: powershell
        run: |
          Set-Location -LiteralPath frontend
          npm.cmd install

      - name: Build frontend
        shell: powershell
        run: |
          Set-Location -LiteralPath frontend
          npm.cmd run build

      - name: Build Windows EXE
        shell: powershell
        run: |
          powershell -ExecutionPolicy Bypass -File scripts/build_windows_exe_ci.ps1

      - name: Validate release directory
        shell: powershell
        run: |
          chcp 65001
          $env:PYTHONIOENCODING = "utf-8"
          python scripts/check_windows_release.py

      - name: Ensure release exe exists
        shell: powershell
        run: |
          if (-not (Test-Path "release/PPT-Agent.exe")) {
            Write-Error "Missing release/PPT-Agent.exe"
          }

      - name: Create release zip
        id: package
        shell: powershell
        run: |
          $tag = "${{ github.ref_name }}"
          $packageDir = "PPT-Agent-Windows-$tag"
          $zipName = "$packageDir.zip"
          if (Test-Path $packageDir) { Remove-Item -LiteralPath $packageDir -Recurse -Force }
          if (Test-Path $zipName) { Remove-Item -LiteralPath $zipName -Force }
          New-Item -ItemType Directory -Path $packageDir | Out-Null
          Copy-Item -LiteralPath "release/PPT-Agent.exe" -Destination "$packageDir/PPT-Agent.exe" -Force
          Copy-Item -LiteralPath "release/README.md" -Destination "$packageDir/README.md" -Force
          Copy-Item -LiteralPath "release/WINDOWS_QUICKSTART.md" -Destination "$packageDir/WINDOWS_QUICKSTART.md" -Force
          Copy-Item -LiteralPath "release/RELEASE_NOTES.md" -Destination "$packageDir/RELEASE_NOTES.md" -Force
          Copy-Item -LiteralPath "release/TROUBLESHOOTING.md" -Destination "$packageDir/TROUBLESHOOTING.md" -Force
          Copy-Item -LiteralPath "release/.env.example" -Destination "$packageDir/.env.example" -Force
          Compress-Archive -Path "$packageDir/*" -DestinationPath $zipName -Force
          "zip_name=$zipName" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: PPT Agent Windows ${{ github.ref_name }}
          body_path: RELEASE_NOTES.md
          files: ${{ steps.package.outputs.zip_name }}
